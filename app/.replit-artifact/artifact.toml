kind = "mobile"
previewPath = "/mobile/"
title = "MySchool Mobile"
version = "1.0.0"
id = "artifacts/myschool-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 23398

[services.development]
run = "pnpm --filter @workspace/myschool-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/myschool-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/myschool-mobile", "run", "serve" ]

[services.env]
PORT = "23398"
BASE_PATH = "/mobile/"
